version: '3.8'

services:
  auth-service:
    build: ./auth-service
    ports:
      - "8001:8000"
    networks:
      - micro-network

  user-service:
    build: ./user-service
    ports:
      - "8002:8000"
    networks:
      - micro-network

  product-service:
    build: ./product-service
    ports:
      - "8003:8000"
    networks:
      - micro-network

  order-service:
    build: ./order-service
    ports:
      - "8004:8000"
    environment:
      - DB_HOST=db
    networks:
      - micro-network

  chat-service:
    build: ./chat-service
    ports:
      - "8005:8000"
    networks:
      - micro-network

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: microservices
    networks:
      - micro-network

  nginx:
    image: nginx:latest
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - auth-service
      - user-service
      - product-service
      - order-service
      - chat-service
    networks:
      - micro-network

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - micro-network

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    networks:
      - micro-network

networks:
  micro-network:
    driver: bridge
